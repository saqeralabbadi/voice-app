<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقي للتواصل - نسخة واقعية</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            user-select: none;
        }

        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 24px; }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 500px; 
            width: 100%; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; /* لقص الصورة مع حواف الكرت */
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.2s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid white;
        }

        /* تنسيق الصور الواقعية */
        .card img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; /* يجعل الصورة تملأ المساحة دون تشويه */
        }

        .card p { 
            font-size: 22px; 
            font-weight: bold; 
            margin: 15px 0; 
            color: #333;
        }

        .card:active { transform: scale(0.95); }

        /* تمييز الحواف بألوان هادئة */
        .hunger { border-color: #ff9f43; }
        .thirst { border-color: #48dbfb; }
        .toilet { border-color: #54a0ff; }
        .sleep { border-color: #a29bfe; }

        .emergency-btn { 
            background-color: #ff6b6b; 
            color: white; 
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            margin-top: 30px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none;
        }
    </style>
</head>
<body onclick="initAudio()">

    <h1>مُسَاعِدِي الذَّكِيُّ</h1>

    <div class="grid-container">
        <!-- جوع - صورة واقعية لخبز وفواكه -->
        <div class="card hunger" onclick="speak('أَنَا جَائِعٌ، أُرِيدُ أَنْ آكُلَ')">
            <img src="https://images.unsplash.com/photo-1494390248081-4e521a5940db?auto=format&fit=crop&w=400&q=80" alt="طعام">
            <p>جُوع</p>
        </div>

        <!-- عطش - صورة واقعية لكوب ماء صافي -->
        <div class="card thirst" onclick="speak('أَنَا عَطْشَانٌ، أُرِيدُ مَاءً')">
            <img src="https://images.unsplash.com/photo-1548919973-5cfe5d4fc474?auto=format&fit=crop&w=400&q=80" alt="ماء">
            <p>عَطَش</p>
        </div>

        <!-- حمام - صورة واقعية لحمام نظيف -->
        <div class="card toilet" onclick="speak('أُرِيدُ الذَّهَابَ إِلَى الْحَمَّامِ')">
            <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=400&q=80" alt="حمام">
            <p>حَمَّام</p>
        </div>

        <!-- نوم - صورة واقعية لسرير مريح -->
        <div class="card sleep" onclick="speak('أَنَا مُتْعَبٌ، أُرِيدُ أَنْ أَنَامَ')">
            <img src="https://images.unsplash.com/photo-1505691938895-1758d7eaa511?auto=format&fit=crop&w=400&q=80" alt="نوم">
            <p>نَوْم</p>
        </div>
    </div>

    <button class="emergency-btn" onclick="speak('سَاعِدْنِي مِنْ فَضْلِكَ')">🔔 مُسَاعَدَة عاجلة!</button>

    <script>
        let audioInitialized = false;

        function initAudio() {
            if (!audioInitialized) {
                window.speechSynthesis.cancel();
                audioInitialized = true;
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            // محاولة العثور على صوت هادئ (صوت طبيعي)
            const voices = window.speechSynthesis.getVoices();
            // البحث عن صوت عربي "natural" أو محسن
            const arabicVoice = voices.find(v => v.lang.includes('ar') && v.name.includes('Natural')) || 
                               voices.find(v => v.lang.includes('ar'));

            if (arabicVoice) utterance.voice = arabicVoice;

            utterance.lang = 'ar-SA';
            utterance.rate = 0.75; // سرعة هادئة وبطيئة تناسب الأطفال
            utterance.pitch = 1.2; // رفع الطبقة قليلاً لتبدو أقرب لصوت طفل

            window.speechSynthesis.speak(utterance);
        }

        // تحميل الأصوات
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>

</body>
</html>
