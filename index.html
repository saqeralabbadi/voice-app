<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُسَاعِدِي الذَّكِيُّ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            user-select: none;
        }

        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 24px; text-align: center; }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 500px; 
            width: 100%; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.1s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        /* تنسيق الصور لضمان ظهورها بشكل صحيح */
        .card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover;
            display: block; /* لضمان عدم وجود مسافات غريبة */
        }

        .card p { 
            font-size: 22px; 
            font-weight: bold; 
            margin: 12px 0; 
            color: #333;
        }

        .card:active { transform: scale(0.95); background-color: #f9f9f9; }

        /* ألوان الحواف */
        .hunger { border-color: #ff9f43; }
        .thirst { border-color: #48dbfb; }
        .toilet { border-color: #54a0ff; }
        .sleep { border-color: #a29bfe; }

        .emergency-btn { 
            background-color: #ff6b6b; 
            color: white; 
            width: 100%; 
            max-width: 500px; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            margin-top: 30px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            border: none;
        }
    </style>
</head>
<body onclick="initAudio()">

    <h1>مُسَاعِدِي الذَّكِيُّ</h1>

    <div class="grid-container">
        <!-- طعام -->
        <div class="card hunger" onclick="speak('أَنَا جَائِعٌ، أُرِيدُ أَنْ آكُلَ')">
            <img src="https://img.freepik.com/free-photo/delicious-sandwich-with-apples-table_23-2148290632.jpg" alt="طعام">
            <p>جُوع</p>
        </div>

        <!-- ماء -->
        <div class="card thirst" onclick="speak('أَنَا عَطْشَانٌ، أُرِيدُ مَاءً')">
            <img src="https://img.freepik.com/free-photo/fresh-water-glass_144627-18305.jpg" alt="ماء">
            <p>عَطَش</p>
        </div>

        <!-- حمام -->
        <div class="card toilet" onclick="speak('أُرِيدُ الذَّهَابَ إِلَى الْحَمَّامِ')">
            <img src="https://img.freepik.com/free-photo/view-modern-restroom-with-toilet_23-2150705642.jpg" alt="حمام">
            <p>حَمَّام</p>
        </div>

        <!-- نوم -->
        <div class="card sleep" onclick="speak('أَنَا مُتْعَبٌ، أُرِيدُ أَنْ أَنَامَ')">
            <img src="https://img.freepik.com/free-photo/comfortable-bed-with-pillows-sheets_23-2148851053.jpg" alt="نوم">
            <p>نَوْم</p>
        </div>
    </div>

    <button class="emergency-btn" onclick="speak('سَاعِدْنِي مِنْ فَضْلِكَ')">🔔 سَاعِدْنِي!</button>

    <script>
        let audioInitialized = false;

        function initAudio() {
            if (!audioInitialized) {
                window.speechSynthesis.cancel();
                audioInitialized = true;
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            // ضبط اللغة والسرعة
            utterance.lang = 'ar-SA';
            utterance.rate = 0.7; // هادئ جداً
            utterance.pitch = 1.3; // نبرة طفل

            window.speechSynthesis.speak(utterance);
        }

        // تحميل المحرك
        window.speechSynthesis.getVoices();
    </script>

</body>
</html>
